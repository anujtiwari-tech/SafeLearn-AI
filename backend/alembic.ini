# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to dateutil.tz.gettz()
# leave blank for localtime
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a companion .py file to be considered valid candidate
# configurations for a revision
# sourceless = false

# version location specification; this defaults
# to alembic/versions.  When using multiple version
# directories, platforms, etc., see the documentation for array-like
# configurations
# version_locations = %(here)s/alembic/versions

# version_path_separator = :
# set to ':' to use os.pathsep, which is the default
# version_path_separator = ;

# the display format used to write the logging configuration
# state to standard output
# output_encoding = utf-8

sqlalchemy.url = sqlite:///./safelearn_v2.db

[post_write_hooks]
# post_write_hooks allows scripts to be run after generating a revision file.
# See the documentation for details.

[logging]
# Logging configuration for alembic.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
